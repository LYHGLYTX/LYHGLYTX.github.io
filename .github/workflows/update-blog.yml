name: 更新工作状态博客

on:
  schedule:
    - cron: "0 16 * * *" # 每天 UTC+8 0:00 (UTC 16:00) 运行
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许推送提交

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 生成活动博客
        run: node scripts/generate-activity-blog.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
            echo "NO_CHANGE=true" >> $GITHUB_ENV
          else
            git commit -m "自动更新工作状态博客"
            git push
          fi

      - name: 构建站点
        if: env.NO_CHANGE != 'true'
        run: npm run build

      - name: 部署到 gh-pages
        if: env.NO_CHANGE != 'true'
        run: |
          cd build
          git init
          git checkout -b gh-pages
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "自动部署 $(date +%Y-%m-%d)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
